name: Code Release

on:
  push:
    branches:
      - master
      - main
    paths:
      - "pom.xml"
      - "**/pom.xml"
      - "abstraction/src/**"
      - "common/src/**"
      - "V*/src/**"
      - ".github/workflows/code-release.yml"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish jar release
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            26
          cache: maven

      - name: Cache BuildTools workspaces
        uses: actions/cache@v4
        with:
          path: buildtools-cache
          key: buildtools-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            buildtools-${{ runner.os }}-

      - name: Limit release modules
        run: |
          python3 <<'PY'
          import xml.etree.ElementTree as ET

          ET.register_namespace('', 'http://maven.apache.org/POM/4.0.0')
          ns = {'m': 'http://maven.apache.org/POM/4.0.0'}
          selected_modules = ['abstraction', 'V1_21_11', 'V26_1_2', 'common']
          selected_artifacts = {'ImageFrame-Abstraction', 'ImageFrame-V1_21_11', 'ImageFrame-V26_1_2'}
          spigot_versions = {
              'V1_21_11/pom.xml': '1.21.11-R0.2-SNAPSHOT',
              'V26_1_2/pom.xml': '26.1.2-R0.1-SNAPSHOT',
          }

          root_tree = ET.parse('pom.xml')
          root = root_tree.getroot()
          modules = root.find('m:modules', ns)
          modules.clear()
          for module_name in selected_modules:
              module = ET.SubElement(modules, '{http://maven.apache.org/POM/4.0.0}module')
              module.text = module_name
          root_tree.write('pom.xml', encoding='UTF-8', xml_declaration=True)

          common_tree = ET.parse('common/pom.xml')
          common_root = common_tree.getroot()
          dependencies = common_root.find('m:dependencies', ns)
          for dependency in list(dependencies):
              group_id = dependency.findtext('m:groupId', default='', namespaces=ns)
              artifact_id = dependency.findtext('m:artifactId', default='', namespaces=ns)
              if group_id == 'com.loohp' and artifact_id.startswith('ImageFrame-') and artifact_id not in selected_artifacts:
                  dependencies.remove(dependency)
          common_tree.write('common/pom.xml', encoding='UTF-8', xml_declaration=True)

          abstraction_tree = ET.parse('abstraction/pom.xml')
          abstraction_root = abstraction_tree.getroot()
          abstraction_dependencies = abstraction_root.find('m:dependencies', ns)
          for dependency in list(abstraction_dependencies):
              artifact_id = dependency.findtext('m:artifactId', default='', namespaces=ns)
              if artifact_id == 'craftbukkit':
                  abstraction_dependencies.remove(dependency)
              elif artifact_id == 'spigot-api':
                  dependency.find('m:version', ns).text = '1.21.11-R0.2-SNAPSHOT'
          abstraction_tree.write('abstraction/pom.xml', encoding='UTF-8', xml_declaration=True)

          for pom_path, spigot_version in spigot_versions.items():
              module_tree = ET.parse(pom_path)
              module_root = module_tree.getroot()
              module_dependencies = module_root.find('m:dependencies', ns)
              for dependency in module_dependencies:
                  artifact_id = dependency.findtext('m:artifactId', default='', namespaces=ns)
                  if artifact_id == 'spigot-api':
                      dependency.find('m:version', ns).text = spigot_version
                  elif artifact_id == 'craftbukkit':
                      dependency.find('m:groupId', ns).text = 'org.spigotmc'
                      dependency.find('m:artifactId', ns).text = 'spigot'
                      dependency.find('m:version', ns).text = spigot_version
              module_tree.write(pom_path, encoding='UTF-8', xml_declaration=True)
          PY

      - name: Install CraftBukkit dependencies
        run: |
          set -euo pipefail
          mkdir -p buildtools-cache
          curl -fsSL -o buildtools-cache/BuildTools.jar https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar
          versions="1.21.11 26.1.2"
          for version in $versions; do
            workspace="buildtools-cache/$version"
            mkdir -p "$workspace"
            echo "Installing CraftBukkit artifacts for $version"
            if [ "$version" = "26.1.2" ]; then
              export JAVA_HOME="$JAVA_HOME_26_X64"
            else
              export JAVA_HOME="$JAVA_HOME_21_X64"
            fi
            export PATH="$JAVA_HOME/bin:$PATH"
            java -version
            java -jar buildtools-cache/BuildTools.jar --rev "$version" --output-dir "$workspace"
          done

      - name: Build jar
        run: |
          export JAVA_HOME="$JAVA_HOME_26_X64"
          export PATH="$JAVA_HOME/bin:$PATH"
          mvn -B -DskipTests package

      - name: Create release tag
        id: release_tag
        run: echo "tag=code-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release_tag.outputs.tag }}" common/target/ImageFrame-*.jar \
            --target "$GITHUB_SHA" \
            --title "Code release ${{ steps.release_tag.outputs.tag }}" \
            --notes "Automated jar release for code changes in $GITHUB_SHA."
