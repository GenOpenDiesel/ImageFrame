name: Code Release

on:
  push:
    branches:
      - master
      - main
    paths:
      - "pom.xml"
      - "**/pom.xml"
      - "abstraction/src/**"
      - "common/src/**"
      - "V*/src/**"
      - ".github/workflows/code-release.yml"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build
        run: mvn -B -DskipTests package

      - name: Create release tag
        id: release_tag
        run: echo "tag=code-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release_tag.outputs.tag }}" common/target/ImageFrame-*.jar \
            --target "$GITHUB_SHA" \
            --title "Code release ${{ steps.release_tag.outputs.tag }}" \
            --notes "Automated release for code changes in $GITHUB_SHA."
