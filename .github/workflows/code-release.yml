name: Code Release

on:
  push:
    branches:
      - master
      - main
    paths:
      - "pom.xml"
      - "**/pom.xml"
      - "abstraction/src/**"
      - "common/src/**"
      - "V*/src/**"
      - ".github/workflows/code-release.yml"

permissions:
  contents: write

jobs:
  release:
    name: Publish source release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release tag
        id: release_tag
        run: echo "tag=code-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Package source
        run: git archive --format=zip --output "ImageFrame-${{ steps.release_tag.outputs.tag }}.zip" "$GITHUB_SHA"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release_tag.outputs.tag }}" "ImageFrame-${{ steps.release_tag.outputs.tag }}.zip" \
            --target "$GITHUB_SHA" \
            --title "Code release ${{ steps.release_tag.outputs.tag }}" \
            --notes "Automated source release for code changes in $GITHUB_SHA."
